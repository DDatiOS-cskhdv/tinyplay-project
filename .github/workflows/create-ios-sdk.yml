name: Create iOS SDK Tarballs (Run Once)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag de upload len Releases (vd ios-sdk-v1)
        required: true
        default: ios-sdk-v1

jobs:
  create-ios-sdk:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
    - name: Checkout renpy-build de lay ios_toolchains.sh
      uses: actions/checkout@v4
      with:
        repository: renpy/renpy-build
        path: renpy-build

    - name: Verify Xcode
      run: |
        xcodebuild -version
        xcrun --sdk iphoneos --show-sdk-path
        xcrun --sdk iphonesimulator --show-sdk-path

    - name: Chay ios_toolchains.sh de tao SDK tarballs
      run: |
        cd renpy-build/tars
        bash ios_toolchains.sh /Applications/Xcode_15.4.app
        echo "=== Ket qua ==="
        ls -lh *.tar.gz *.tar.bz2 2>/dev/null || true

    - name: Kiem tra file dau ra
      run: |
        cd renpy-build/tars
        test -f iPhoneOS14.0.sdk.tar.gz \
          && echo "OK: iPhoneOS14.0.sdk.tar.gz" \
          || { echo "ERROR: iPhoneOS14.0.sdk.tar.gz khong ton tai!"; exit 1; }
        test -f iPhoneSimulator14.0.sdk.tar.gz \
          && echo "OK: iPhoneSimulator14.0.sdk.tar.gz" \
          || { echo "ERROR: iPhoneSimulator14.0.sdk.tar.gz khong ton tai!"; exit 1; }

    - name: Copy SDK files ra workspace
      run: |
        cp renpy-build/tars/iPhoneOS14.0.sdk.tar.gz .
        cp renpy-build/tars/iPhoneSimulator14.0.sdk.tar.gz .

    - name: Upload len GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.release_tag }}
        name: iOS SDK Tarballs (${{ inputs.release_tag }})
        body: |
          iOS SDK tarballs duoc tao tu Xcode 15.4 tren macos-14.
          Dung cho workflow build Renpy iOS tren Ubuntu.
        files: |
          iPhoneOS14.0.sdk.tar.gz
          iPhoneSimulator14.0.sdk.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
