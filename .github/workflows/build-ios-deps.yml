name: Build TinyPlay – Ren'Py iOS Stack via renpy-build

on:
  workflow_dispatch:
    inputs:
      renpy_ref:
        description: 'Ren''Py git ref (tag or branch) to build against'
        required: true
        default: '8.1.3.23091805'
      renpybuild_ref:
        description: 'renpy-build git ref to use'
        required: true
        default: 'master'

jobs:
  build-renpy-ios:
    runs-on: macos-14
    timeout-minutes: 300

    env:
      RENPY_DEPS_INSTALL: /usr/local::/usr/local/lib

    steps:

      # -----------------------------------------------------------------------
      # 1. Checkout renpy-build (lfs:true để lấy file binary trong source/)
      # -----------------------------------------------------------------------
      - name: Checkout renpy-build
        uses: actions/checkout@v4
        with:
          repository: renpy/renpy-build
          ref: ${{ inputs.renpybuild_ref }}
          path: renpy-build
          lfs: true

      # -----------------------------------------------------------------------
      # 2. Checkout Ren'Py source (fetch-tags:true để resolve tag x.x.x.xxxxxxxx)
      # -----------------------------------------------------------------------
      - name: Checkout Ren'Py source
        uses: actions/checkout@v4
        with:
          repository: renpy/renpy
          ref: ${{ inputs.renpy_ref }}
          path: renpy-build/renpy
          fetch-tags: true

      # -----------------------------------------------------------------------
      # 3. Verify MetalANGLE đã có sẵn từ LFS
      # -----------------------------------------------------------------------
      - name: Verify bundled source files
        run: |
          echo "=== Files in renpy-build/source/ ==="
          ls -lh renpy-build/source/

          test -f renpy-build/source/MetalANGLE.xcframework.tar.gz \
            && echo "OK: MetalANGLE.xcframework.tar.gz found" \
            || { echo "ERROR: MetalANGLE.xcframework.tar.gz missing!"; exit 1; }

      # -----------------------------------------------------------------------
      # 4. Download các tarballs còn thiếu trong source/
      # -----------------------------------------------------------------------
      - name: Download missing tarballs
        run: |
          cd renpy-build/source

          fetch() {
            local dest="$1"
            local url="$2"
            if [ -f "$dest" ]; then
              echo "SKIP (exists): $dest"
            else
              echo "Downloading: $dest"
              curl -fL "$url" -o "$dest"
            fi
          }

          fetch "harfbuzz-8.3.0.tar.xz" \
            "https://github.com/harfbuzz/harfbuzz/releases/download/8.3.0/harfbuzz-8.3.0.tar.xz"

          fetch "fribidi-1.0.13.tar.xz" \
            "https://github.com/fribidi/fribidi/releases/download/v1.0.13/fribidi-1.0.13.tar.xz"

          fetch "libjpeg-turbo-3.0.2.tar.gz" \
            "https://github.com/libjpeg-turbo/libjpeg-turbo/releases/download/3.0.2/libjpeg-turbo-3.0.2.tar.gz"

          fetch "libpng-1.6.42.tar.gz" \
            "https://download.sourceforge.net/libpng/libpng-1.6.42.tar.gz"

          echo "=== Final source/ contents ==="
          ls -lh .

      # -----------------------------------------------------------------------
      # 5. Verify Xcode và iOS SDK
      # -----------------------------------------------------------------------
      - name: Verify Xcode SDK
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path
          xcrun --sdk iphoneos clang --version

      # -----------------------------------------------------------------------
      # 6. Install Homebrew build dependencies
      # FIX #1: Thêm gnu-tar để hỗ trợ flag -a (auto-detect compression)
      #         BSD tar trên macOS không hỗ trợ tar xaf
      # FIX #2: KHÔNG cài cython từ Homebrew (keg-only = không vào PATH)
      #         Cython sẽ được cài qua pip ở bước 8
      # -----------------------------------------------------------------------
      - name: Install Homebrew build dependencies
        run: |
          brew install \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            cmake \
            ninja \
            nasm \
            gnu-tar \
            ccache

          # Override BSD tar bằng GNU tar trong PATH cho toàn bộ job
          echo "/opt/homebrew/opt/gnu-tar/libexec/gnubin" >> $GITHUB_PATH

      # -----------------------------------------------------------------------
      # 7. Set up host Python 3.11
      # -----------------------------------------------------------------------
      - name: Set up host Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------------
      # 8. Install Python dependencies
      # FIX: cài Cython qua pip thay vì Homebrew để nó có trong PATH
      # -----------------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install Cython jinja2 toml tomli requests

          # Verify cython có trong PATH
          echo "=== Cython version ==="
          cython --version

          # Verify GNU tar đã override BSD tar
          echo "=== tar version ==="
          tar --version | head -1

      # -----------------------------------------------------------------------
      # 9. Package iPhoneOS SDK from installed Xcode into expected tarball
      # FIX: ios_toolchains.sh uses DEVELOPER_DIR without leading slash, broken.
      #      We directly package the Xcode SDK already on the runner.
      #
      # renpy-build/tasks/toolchain.py does:
      #   c.run("tar xaf {{ tars }}/iPhoneOS14.0.sdk.tar.gz")
      # in directory cross.ios-arm64/, so the tarball must unpack to:
      #   cross.ios-arm64/iPhoneOS14.0.sdk/   <-- exact dir name matters
      # -----------------------------------------------------------------------
      - name: Package iPhoneOS SDK tarball for renpy-build
        run: |
          XCODE_DEV="$(xcode-select -p)"
          echo "Xcode developer path: $XCODE_DEV"

          IPHONEOS_SDK="$(xcrun --sdk iphoneos --show-sdk-path)"
          echo "iPhoneOS SDK: $IPHONEOS_SDK"

          CXX_INCLUDES="$XCODE_DEV/Toolchains/XcodeDefault.xctoolchain/usr/include/c++/v1"

          # Staging: tarball must unpack to a dir named iPhoneOS14.0.sdk/
          STAGING=$(mktemp -d)
          SDK_STAGE="$STAGING/iPhoneOS14.0.sdk"
          echo "Staging: $SDK_STAGE"

          # rsync để follow symlinks đúng cách (cp -R bỏ qua symlinks → 134B)
          rsync -aL "$IPHONEOS_SDK/" "$SDK_STAGE/"

          SDK_SIZE=$(du -sh "$SDK_STAGE" | cut -f1)
          echo "SDK staged size: $SDK_SIZE"

          # Merge C++ headers nếu có
          if [ -d "$CXX_INCLUDES" ]; then
            mkdir -p "$SDK_STAGE/usr/include/c++"
            rsync -aL "$CXX_INCLUDES/" "$SDK_STAGE/usr/include/c++/v1/"
            echo "C++ includes: OK"
          else
            echo "C++ includes: not found at $CXX_INCLUDES (skipping)"
          fi

          echo "Packing iPhoneOS14.0.sdk.tar.gz ..."
          tar -czf renpy-build/tars/iPhoneOS14.0.sdk.tar.gz -C "$STAGING" iPhoneOS14.0.sdk
          rm -rf "$STAGING"

          TAR_SIZE=$(du -sh renpy-build/tars/iPhoneOS14.0.sdk.tar.gz | cut -f1)
          echo "Done: $TAR_SIZE"

          # Sanity check — tarball phải > 10MB
          TAR_BYTES=$(stat -f%z renpy-build/tars/iPhoneOS14.0.sdk.tar.gz)
          if [ "$TAR_BYTES" -lt 10000000 ]; then
            echo "ERROR: tarball too small ($TAR_BYTES bytes) — SDK copy likely failed"
            exit 1
          fi

          ls -lh renpy-build/tars/

      # -----------------------------------------------------------------------
      # 10. Build Ren'Py iOS stack (arm64 physical device)
      # -----------------------------------------------------------------------
      - name: Build Ren'Py iOS stack (arm64 device)
        run: |
          cd renpy-build
          python3 -m renpybuild \
            --platform ios \
            --arch arm64 \
            --python 3

      # -----------------------------------------------------------------------
      # 11. Debug: list produced artifacts
      # -----------------------------------------------------------------------
      - name: List produced artifacts
        run: |
          cd renpy-build

          echo "=== .a files ==="
          find tmp/install.ios-arm64/lib/ -name "*.a" | sort 2>/dev/null || echo "tmp/ not found"

          echo "=== prebuilt/release ==="
          ls -lh renpy/renios3/prototype/prebuilt/release/ 2>/dev/null \
            || echo "WARNING: prebuilt/release not found"

          echo "=== py3-ios-arm64 ==="
          ls renpy/lib/py3-ios-arm64/ 2>/dev/null \
            || echo "WARNING: py3-ios-arm64 not found"

      # -----------------------------------------------------------------------
      # 12. Verify arm64 architecture
      # -----------------------------------------------------------------------
      - name: Verify arm64 architecture
        run: |
          FAILED=0
          for lib in renpy-build/renpy/renios3/prototype/prebuilt/release/*.a; do
            if [ -f "$lib" ]; then
              ARCHS=$(lipo -archs "$lib" 2>/dev/null || echo "lipo failed")
              if echo "$ARCHS" | grep -q "arm64"; then
                echo "PASS: $(basename $lib) — $ARCHS"
              else
                echo "FAIL: $(basename $lib) — $ARCHS"
                FAILED=1
              fi
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

      # -----------------------------------------------------------------------
      # 13. Package static libraries
      # -----------------------------------------------------------------------
      - name: Package arm64 static libraries
        run: |
          mkdir -p artifacts/lib
          cp renpy-build/renpy/renios3/prototype/prebuilt/release/*.a artifacts/lib/
          ls -lh artifacts/lib/
          tar -czf renpy-ios-libraries.tar.gz -C artifacts/lib .

      # -----------------------------------------------------------------------
      # 14. Package MetalANGLE framework
      # -----------------------------------------------------------------------
      - name: Package MetalANGLE framework
        run: |
          mkdir -p artifacts/frameworks
          cp -R renpy-build/renpy/renios3/prototype/Frameworks/MetalANGLE.xcframework \
            artifacts/frameworks/ 2>/dev/null \
            || echo "WARNING: MetalANGLE.xcframework not found"
          tar -czf renpy-ios-frameworks.tar.gz -C artifacts/frameworks .

      # -----------------------------------------------------------------------
      # 15. Package Python distribution
      # -----------------------------------------------------------------------
      - name: Package Python distribution
        run: |
          PY_DIST="renpy-build/renpy/lib/py3-ios-arm64"
          if [ -d "$PY_DIST" ]; then
            tar -czf renpy-ios-pythonlib.tar.gz -C "$PY_DIST" .
            echo "Packaged: $(du -sh $PY_DIST | cut -f1)"
          else
            echo "ERROR: $PY_DIST not found"
            find renpy-build/renpy/lib -maxdepth 2 -type d | head -20
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 16. Upload artifacts
      # -----------------------------------------------------------------------
      - name: Upload static libraries
        uses: actions/upload-artifact@v4
        with:
          name: renpy-ios-libraries
          path: renpy-ios-libraries.tar.gz
          retention-days: 14

      - name: Upload MetalANGLE framework
        uses: actions/upload-artifact@v4
        with:
          name: renpy-ios-frameworks
          path: renpy-ios-frameworks.tar.gz
          retention-days: 14

      - name: Upload Python distribution
        uses: actions/upload-artifact@v4
        with:
          name: renpy-ios-pythonlib
          path: renpy-ios-pythonlib.tar.gz
          retention-days: 14
