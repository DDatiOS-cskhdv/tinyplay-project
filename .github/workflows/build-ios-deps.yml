name: Build TinyPlay iOS Dependencies

on:
  workflow_dispatch: # Allows manual trigger of the workflow

jobs:
  build-deps:
    runs-on: macos-14
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Homebrew Dependencies
        run: |
          brew install autoconf automake libtool pkg-config cmake

      - name: Install Python Toolchain Tools
        run: |
          python -m pip install --upgrade pip
          pip install kivy-ios cython==0.29.36

      - name: Verify Environment Xcode and SDK
        run: |
          xcodebuild -version
          xcrun -sdk iphoneos --show-sdk-path

      - name: Compile iOS Recipes via kivy-ios
        run: |
          # Build Python interpreter, SDL2 core, image, ttf, mixer modules, and pyobjus
          # pygame_sdl2 has been removed since it is NOT a standard kivy-ios recipe and fails toolchain resolution
          python3 -m kivy_ios.toolchain build python3 sdl2 sdl2_image sdl2_ttf sdl2_mixer pyobjus

      - name: Print Compiled Artifact Directory Structure (Debugging)
        run: |
          echo "=== Searching for static libraries (*.a) ==="
          find . -name "*.a"
          
          echo "=== Searching for frameworks (*.framework) ==="
          find . -name "*.framework"
          
          echo "=== Searching for xcframeworks (*.xcframework) ==="
          find . -name "*.xcframework"

      - name: Package iOS Libraries (Dynamic Discovery)
        run: |
          mkdir -p output/lib
          
          # Dynamically locate compiled library files from toolchain outputs
          # and copy them to the output folder
          LIBS=("libSDL2.a" "libSDL2_image.a" "libSDL2_ttf.a" "libSDL2_mixer.a" "libpyobjus.a" "libpython3.a" "libpython3.10.a")
          for lib in "${LIBS[@]}"; do
            discovered_lib=$(find build/ dist/ -type f -name "$lib" | head -n 1)
            if [ -n "$discovered_lib" ]; then
              echo "Discovered and copying: $discovered_lib"
              cp "$discovered_lib" "output/lib/$(basename "$discovered_lib")"
            else
              echo "WARNING: Could not locate compiled static library: $lib"
            fi
          done
          
          # Package all found libraries
          tar -cvzf ios-libraries.tar.gz -C output/lib .

      - name: Package iOS Headers (Dynamic Discovery)
        run: |
          mkdir -p output/include
          
          # Dynamically discover include directories in toolchain output and copy them
          discovered_include=$(find dist/ -type d -name "include" | head -n 1)
          if [ -n "$discovered_include" ]; then
            echo "Discovered include folder: $discovered_include"
            cp -R "$discovered_include"/* output/include/
          else
            # Fallback to copy from build directories if dist is missing
            fallback_include=$(find build/ -type d -name "include" | head -n 1)
            if [ -n "$fallback_include" ]; then
              echo "Discovered fallback include: $fallback_include"
              cp -R "$fallback_include"/* output/include/
            fi
          fi
          
          # Package include folder
          tar -cvzf ios-headers.tar.gz -C output/include .

      - name: Upload Libraries Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-libraries
          path: ios-libraries.tar.gz

      - name: Upload Headers Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-headers
          path: ios-headers.tar.gz
