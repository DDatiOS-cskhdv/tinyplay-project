name: Build TinyPlay - Renpy iOS Stack

on:
  workflow_dispatch:
    inputs:
      renpy_ref:
        description: Renpy git ref (tag or branch)
        required: true
        default: 8.1.3.23091805
      renpybuild_ref:
        description: renpy-build git ref
        required: true
        default: master
      sdk_release_tag:
        description: Release tag containing iOS SDK (e.g. ios-sdk-v1)
        required: true
        default: ios-sdk-v1
      arch:
        description: iOS arch to build (arm64, sim-arm64, sim-x86_64)
        required: true
        default: arm64

permissions:
  contents: read

jobs:
  build-renpy-ios:
    runs-on: ubuntu-24.04
    timeout-minutes: 300

    steps:
    - name: Clone renpy-build
      run: |
        git clone --depth=1 \
          --branch ${{ inputs.renpybuild_ref }} \
          https://github.com/renpy/renpy-build \
          ~/renpy-build

    - name: Clone Renpy source
      run: |
        git clone --depth=1 \
          --branch ${{ inputs.renpy_ref }} \
          https://github.com/renpy/renpy \
          ~/renpy-build/renpy

    - name: Download iOS SDK tarballs from Releases
      run: |
        cd ~/renpy-build/tars

        REPO="${{ github.repository }}"
        TAG="${{ inputs.sdk_release_tag }}"
        BASE="https://github.com/${REPO}/releases/download/${TAG}"

        echo "Downloading iPhoneOS14.0.sdk.tar.gz ..."
        curl -fL \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          "${BASE}/iPhoneOS14.0.sdk.tar.gz" \
          -o iPhoneOS14.0.sdk.tar.gz
        echo "OK: $(du -sh iPhoneOS14.0.sdk.tar.gz | cut -f1)"

        echo "Downloading iPhoneSimulator14.0.sdk.tar.gz ..."
        curl -fL \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          "${BASE}/iPhoneSimulator14.0.sdk.tar.gz" \
          -o iPhoneSimulator14.0.sdk.tar.gz
        echo "OK: $(du -sh iPhoneSimulator14.0.sdk.tar.gz | cut -f1)"

        echo "=== tars/ contents ==="
        ls -lh .

    - name: Download third-party source tarballs
      run: |
        cd ~/renpy-build/tars

        fetch() {
          local dest="$1"
          local url="$2"
          if [ -f "$dest" ]; then
            echo "SKIP (exists): $dest"
          else
            echo "Downloading: $dest"
            curl -fL "$url" -o "$dest"
          fi
        }

        fetch "harfbuzz-8.3.0.tar.xz" \
          "https://github.com/harfbuzz/harfbuzz/releases/download/8.3.0/harfbuzz-8.3.0.tar.xz"
        fetch "fribidi-1.0.13.tar.xz" \
          "https://github.com/fribidi/fribidi/releases/download/v1.0.13/fribidi-1.0.13.tar.xz"
        fetch "libjpeg-turbo-3.0.2.tar.gz" \
          "https://github.com/libjpeg-turbo/libjpeg-turbo/releases/download/3.0.2/libjpeg-turbo-3.0.2.tar.gz"
        fetch "libpng-1.6.42.tar.gz" \
          "https://download.sourceforge.net/libpng/libpng-1.6.42.tar.gz"

    - name: Run prepare.sh
      run: |
        cd ~/renpy-build
        bash prepare.sh

    - name: Build Renpy iOS (${{ inputs.arch }})
      run: |
        cd ~/renpy-build
        ./build.sh \
          --platform ios \
          --arch ${{ inputs.arch }} \
          --python 3

    - name: List produced artifacts
      run: |
        cd ~/renpy-build
        echo "=== .a static libs ==="
        find tmp/install.ios-${{ inputs.arch }}/lib/ -name "*.a" | sort 2>/dev/null \
          || echo "WARNING: no .a files found"
        echo "=== prebuilt/release ==="
        ls -lh renpy/renios3/prototype/prebuilt/release/ 2>/dev/null \
          || echo "WARNING: not found"
        echo "=== py3-ios-${{ inputs.arch }} ==="
        ls renpy/lib/py3-ios-${{ inputs.arch }}/ 2>/dev/null \
          || echo "WARNING: not found"

    - name: Package static libraries
      run: |
        mkdir -p /tmp/artifacts/lib
        cp ~/renpy-build/renpy/renios3/prototype/prebuilt/release/*.a \
          /tmp/artifacts/lib/ 2>/dev/null || true
        tar -czf renpy-ios-libraries.tar.gz -C /tmp/artifacts/lib .

    - name: Package MetalANGLE framework
      run: |
        mkdir -p /tmp/artifacts/frameworks
        cp -R ~/renpy-build/renpy/renios3/prototype/Frameworks/MetalANGLE.xcframework \
          /tmp/artifacts/frameworks/ 2>/dev/null \
          || echo "WARNING: MetalANGLE.xcframework not found"
        tar -czf renpy-ios-frameworks.tar.gz -C /tmp/artifacts/frameworks .

    - name: Package Python distribution
      run: |
        PY_DIST="$HOME/renpy-build/renpy/lib/py3-ios-${{ inputs.arch }}"
        if [ -d "$PY_DIST" ]; then
          tar -czf renpy-ios-pythonlib.tar.gz -C "$PY_DIST" .
          echo "Packaged: $(du -sh $PY_DIST | cut -f1)"
        else
          echo "ERROR: $PY_DIST not found"
          find ~/renpy-build/renpy/lib -maxdepth 2 -type d | head -20
          exit 1
        fi

    - name: Upload static libraries
      uses: actions/upload-artifact@v4
      with:
        name: renpy-ios-libraries-${{ inputs.arch }}
        path: renpy-ios-libraries.tar.gz
        retention-days: 14

    - name: Upload MetalANGLE framework
      uses: actions/upload-artifact@v4
      with:
        name: renpy-ios-frameworks-${{ inputs.arch }}
        path: renpy-ios-frameworks.tar.gz
        retention-days: 14

    - name: Upload Python distribution
      uses: actions/upload-artifact@v4
      with:
        name: renpy-ios-pythonlib-${{ inputs.arch }}
        path: renpy-ios-pythonlib.tar.gz
        retention-days: 14
